<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Guitar body -->
  <ellipse cx="32" cy="44" rx="14" ry="16" fill="#c8823a"/>
  <ellipse cx="32" cy="44" rx="10" ry="12" fill="#e09a4a"/>
  <!-- Waist -->
  <rect x="27" y="34" width="10" height="8" fill="#c8823a"/>
  <!-- Upper bout -->
  <ellipse cx="32" cy="32" rx="10" ry="10" fill="#c8823a"/>
  <ellipse cx="32" cy="32" rx="7" ry="7" fill="#e09a4a"/>
  <!-- Sound hole -->
  <circle cx="32" cy="44" r="4" fill="#7a4a1a"/>
  <!-- Neck -->
  <rect x="29.5" y="8" width="5" height="26" rx="2" fill="#a0622a"/>
  <!-- Headstock -->
  <rect x="28" y="4" width="8" height="8" rx="2" fill="#8a5220"/>
  <!-- Tuning pegs -->
  <circle cx="26" cy="6" r="2" fill="#888"/>
  <circle cx="38" cy="6" r="2" fill="#888"/>
  <circle cx="26" cy="10" r="2" fill="#888"/>
  <circle cx="38" cy="10" r="2" fill="#888"/>
  <!-- Strings -->
  <line x1="30" y1="8" x2="30" y2="40" stroke="#d4b896" stroke-width="0.5" opacity="0.7"/>
  <line x1="32" y1="8" x2="32" y2="40" stroke="#d4b896" stroke-width="0.5" opacity="0.7"/>
  <line x1="34" y1="8" x2="34" y2="40" stroke="#d4b896" stroke-width="0.5" opacity="0.7"/>
  <!-- Nut -->
  <rect x="28.5" y="22" width="7" height="1.5" rx="0.5" fill="#f0e0c0"/>
</svg>
